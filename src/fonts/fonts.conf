<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Font directories -->
  <dir>.</dir>
  <dir>./ttf</dir>

  <!-- Load local configuration files -->
  <include prefix="xdg">fontconfig/conf.d</include>
  <include>conf.d</include>

  <!-- Define the custom fonts -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>Space Mono</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>Space Mono</string>
    </edit>
    <edit name="file" mode="assign" binding="same">
      <string>./ttf/SpaceMono-Regular.ttf</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family">
      <string>Roboto Mono</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>Roboto Mono</string>
    </edit>
    <edit name="file" mode="assign" binding="same">
      <string>./ttf/RobotoMono-Regular.ttf</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family">
      <string>Source Code Pro</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>Source Code Pro</string>
    </edit>
    <edit name="file" mode="assign" binding="same">
      <string>./ttf/SourceCodePro-Regular.ttf</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family">
      <string>JetBrains Mono</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>JetBrains Mono</string>
    </edit>
    <edit name="file" mode="assign" binding="same">
      <string>./ttf/JetBrainsMono-Regular.ttf</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family">
      <string>IBM Plex Mono</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>IBM Plex Mono</string>
    </edit>
    <edit name="file" mode="assign" binding="same">
      <string>./ttf/IBMPlexMono-Regular.ttf</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family">
      <string>Cutive Mono</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>Cutive Mono</string>
    </edit>
    <edit name="file" mode="assign" binding="same">
      <string>./ttf/CutiveMono-Regular.ttf</string>
    </edit>
  </match>

  <!-- Basic rendering settings -->
  <match target="font">
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
    <edit name="lcdfilter" mode="assign">
      <const>lcddefault</const>
    </edit>
  </match>
</fontconfig> 